name: Binder warm-up

# Pre-warm the mybinder.org image cache for the latest two Qiskit minors
# (small + xl only — xxl is excluded; see "Resolve targets" below) plus
# the `latest-{small,xl}` aliases and any explicitly pinned extra
# targets (see EXTRA in "Resolve targets"), so the first user after a fresh image
# publish lands on a warm cache instead of paying the ~30s cold-pull
# cost. mybinder.org has no official warm-up API;
# we drive it via the public /build endpoint, which serves a
# text/event-stream while it builds (or simply pulls, when the stub
# branch already references a prebuilt GHCR image). Once we see
# `phase: ready` we close the connection and move on.
#
# mybinder backends evict cold images on roughly a ~6h schedule, so a
# 12h cadence keeps at least one backend per target warm most of the
# time.
#
# Triggered:
#   - after a successful main-branch run of "Build matrix" (push or
#     workflow_dispatch only — Build matrix's daily cron is filtered
#     out at the job level so it doesn't double-fire with our own cron).
#   - every 12 hours (04:00 + 16:00 UTC). The 04:00 slot lines up with
#     Build matrix's daily republish; the 16:00 slot covers the second
#     eviction window of the day.
#   - manual workflow_dispatch.
#
# Best-effort: warm-up failures do not fail the workflow. mybinder is
# a shared community service and a flaky backend is not our problem
# to escalate.
on:
  workflow_run:
    workflows: ["Build matrix"]
    types: [completed]
    branches: [main]
  schedule:
    # Every 12h, at :00 of each half of the day. The 04:00 slot also
    # picks up the freshly-pushed stub branches from the daily Build
    # matrix cron. mybinder is amd64-only, so this single hit per
    # target covers every user regardless of their local arch.
    - cron: '0 4,16 * * *'
  # Manual trigger lets us validate this workflow without waiting for
  # the next Build matrix run on main. Useful after editing this file
  # itself (since workflow_run only fires after another workflow
  # completes — there is no way to test from a PR otherwise).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warmup:
    # Allowed triggers:
    #  - workflow_dispatch (manual): always
    #  - schedule (our own daily cron): always
    #  - workflow_run from Build matrix: only when its conclusion is
    #    success AND its triggering event was push or workflow_dispatch.
    #    Filter out Build matrix's own scheduled cron so we don't
    #    double-fire alongside our own cron above.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.event == 'push' ||
        github.event.workflow_run.event == 'workflow_dispatch'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # On workflow_run, pin to the SHA whose build just finished;
          # on workflow_dispatch, github.event.workflow_run is null so
          # this resolves to empty and checkout takes its default
          # (the dispatched ref).
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve targets
        id: targets
        # Targets = the latest two Qiskit minors' small+xl variants
        # (in scaffolder order) + the latest-{small,xl} aliases.
        #
        # We derive these from build-matrix.yml's planner `ALL` bash
        # array, but xxl is deliberately excluded: it's a large
        # (~3.5 GB), amd64-only, niche flavor, and warming it every
        # 12h is a poor use of mybinder's shared community infra.
        # xxl images are still prebuilt in GHCR and launch fine — they
        # just pay the one-off cold-pull on first use instead of being
        # kept warm. So we filter `*-xxl` out *before* taking the
        # first four entries; otherwise the interleaved xxl rows
        # (`2.4-small 2.4-xl 2.4-xxl 2.3-small ...`) would shove the
        # previous minor's xl out of the window.
        #
        # Before #31 this read jobs.build.strategy.matrix.version via
        # yq; after #31 that key holds a fromJSON template and the
        # canonical list moved into the planner job's `ALL` array.
        # We extract it directly from the YAML rather than spinning up
        # the planner just to read its output.
        run: |
          set -euo pipefail
          mapfile -t all_versions < <(
            awk '/^ *ALL=\(/{f=1;next} f && /^ *\)/{exit} f' \
              .github/workflows/build-matrix.yml \
            | grep -oE "'[^']+'" \
            | tr -d "'"
          )
          # Drop xxl (and any future heavy flavor) — small + xl only.
          warmable=()
          for v in "${all_versions[@]}"; do
            case "${v}" in
              *-xxl) continue ;;
              *) warmable+=("${v}") ;;
            esac
          done
          if [ "${#warmable[@]}" -lt 4 ]; then
            echo "Expected at least 4 small/xl versions in planner ALL array; got ${#warmable[@]}" >&2
            echo "Has build-matrix.yml's planner block changed shape?" >&2
            exit 1
          fi
          # First 4 of the xxl-filtered list = latest minor (small, xl)
          # + previous minor (small, xl), in scaffolder order.
          targets=("${warmable[0]}" "${warmable[1]}" \
                   "${warmable[2]}" "${warmable[3]}" \
                   "latest-small" "latest-xl")
          # Pinned extras: targets warmed regardless of the rolling
          # latest-two window because a known site depends on them.
          # fun-with-quantum.org pins 2.1-xl (Lab launches) and
          # 2.1-xl-rise (the classic-RISE slideshow games), both long
          # aged out of the window — keep them warm.
          extra=('2.1-xl' '2.1-xl-rise')
          for e in "${extra[@]}"; do
            # Fail loud if a pin is dropped from the matrix, so we
            # never silently warm a nonexistent (404) image.
            found=0
            for v in "${all_versions[@]}"; do
              [ "${v}" = "${e}" ] && found=1 && break
            done
            if [ "${found}" -eq 0 ]; then
              echo "Pinned warm-up target '${e}' not found in build-matrix.yml ALL array." >&2
              echo "Was it dropped from the matrix? Update the 'extra' list." >&2
              exit 1
            fi
            # Dedup: skip if the window already covers it.
            skip=0
            for t in "${targets[@]}"; do
              [ "${t}" = "${e}" ] && skip=1 && break
            done
            [ "${skip}" -eq 0 ] && targets+=("${e}")
          done
          printf 'target: %s\n' "${targets[@]}"
          {
            echo "list<<EOF"
            printf '%s\n' "${targets[@]}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Warm mybinder cache
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME:  ${{ github.event.repository.name }}
          TARGETS:    ${{ steps.targets.outputs.list }}
        # mybinder's /build/gh/<owner>/<repo>/<ref> endpoint serves a
        # text/event-stream — but only when the client sends an
        # Accept: text/event-stream header. Without it the server
        # closes the connection without streaming any phase events at
        # all (which is what an earlier version of this workflow hit:
        # every target "succeeded" in <300ms because awk saw nothing).
        #
        # The endpoint also 307-redirects to a federation backend
        # (e.g. bids.mybinder.org). Without -L curl stops at the
        # redirect and awk sees an empty body, reporting "stream
        # ended without phase=ready" — this was the second variant
        # of the same symptom.
        #
        # We lowercase owner/repo before building the URL so the
        # request URL matches what mybinder canonicalises to (avoids
        # a stray case-sensitive hop on top of the federation one).
        #
        # We read the stream until we see `phase: ready`, then close.
        # Per-target timeout is 5 minutes; our stubs are `FROM
        # <prebuilt>` so a warm or warm-ish backend resolves in well
        # under a minute. Cold backends may exceed that, in which
        # case we move on — partial coverage is still useful.
        #
        # 10s pacing between targets to be polite to a shared
        # community service.
        run: |
          set -euo pipefail
          owner_lc="${REPO_OWNER,,}"
          repo_lc="${REPO_NAME,,}"
          warm_one() {
            local target="$1"
            local url="https://mybinder.org/build/gh/${owner_lc}/${repo_lc}/${target}"
            echo "::group::Warming ${target}"
            echo "GET ${url}"
            local rc=0
            # awk exit codes: 0 = saw phase:ready, 2 = saw phase:failed,
            # 3 = stream ended without either (timeout, network drop,
            # or server hang-up).
            #
            # Two subtleties handled below:
            # 1. awk's `exit N` does NOT skip the END block — END runs
            #    and its own `exit` overrides. So we record the outcome
            #    in `matched` and let END consult it. (Earlier version
            #    `exit 0` then unconditional `exit 3` in END made every
            #    successful warm-up report rc=3.)
            # 2. With `set -o pipefail`, the pipeline's rc would be
            #    curl's, not awk's — awk closes the pipe on match,
            #    sending SIGPIPE to curl which then exits 23 ("Failure
            #    writing output"). We want awk's code, not curl's, so
            #    we read PIPESTATUS[1] directly.
            # We need awk's exit code (0/2/3), not the pipeline's.
            # With `pipefail` the pipeline picks the rightmost
            # non-zero, but curl gets SIGPIPE'd to rc=23 when awk
            # closes the pipe on match, masking awk's 0. Drop
            # pipefail locally so the pipeline's rc is just awk's,
            # and use an if/else so the rc is captured cleanly
            # without `|| true` clobbering PIPESTATUS.
            #
            # Note: with awk closing the pipe early, curl prints
            # "curl: (23) Failure writing output to destination" to
            # stderr — that's expected and not an error condition.
            set +o pipefail
            if curl -sSL -N --max-time 300 \
                  -H 'Accept: text/event-stream' \
                  "${url}" \
                | awk '
                    { print }
                    /"phase": *"ready"/  { matched = 0; exit }
                    /"phase": *"failed"/ { matched = 2; exit }
                    END                  { exit (matched == "" ? 3 : matched) }
                  '; then
              rc=0
            else
              rc=$?
            fi
            set -o pipefail
            echo "::endgroup::"
            case "${rc}" in
              0) echo "::notice::${target} reached phase=ready" ;;
              2) echo "::warning::${target} reported phase=failed" ;;
              3) echo "::warning::${target} stream ended without phase=ready (timeout or no events)" ;;
              *) echo "::warning::${target} warm-up exited rc=${rc}" ;;
            esac
            return "${rc}"
          }
          fail=0
          total=0
          first=1
          while IFS= read -r target; do
            [ -z "${target}" ] && continue
            total=$((total + 1))
            if [ "${first}" -eq 0 ]; then
              echo "Sleeping 10s before next target..."
              sleep 10
            fi
            first=0
            warm_one "${target}" || fail=$((fail + 1))
          done <<< "${TARGETS}"
          echo "Warmed $((total - fail))/${total} targets."
          # Best-effort: never fail the workflow on warm-up issues.
          exit 0
