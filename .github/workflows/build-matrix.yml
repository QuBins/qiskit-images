name: Build matrix

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'Dockerfile'
      - 'versions/**'
      - '.github/workflows/build-matrix.yml'
      # .trivyignore changes the scan verdict for every image (it gates
      # publish), so editing it must re-run the matrix — a new
      # suppression needs to be proven against a real build, and a
      # removed one must re-block.
      - '.trivyignore'
  # PRs from any branch (Dependabot's `dependabot/...` branches don't
  # match the push filter above, so without this they'd merge without
  # ever exercising the build + Trivy gate).
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'versions/**'
      - '.github/workflows/build-matrix.yml'
      - '.trivyignore'
  schedule:
    # Daily rebuild + scan + republish at 04:00 UTC (= 05:00 CET, 06:00
    # CEST). Catches upstream base-image CVEs and dependency drift
    # without waiting for a human-driven push. Always builds the full
    # matrix — that's the whole point of the cron.
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      versions:
        description: >-
          Versions to (re)build, comma-separated (e.g. "2.4-xl,2.3-small")
          or "all". Default "all" rebuilds everything, matching the
          previous behavior.
        type: string
        default: 'all'
        required: false

permissions:
  contents: write     # stub-branch force-pushes (main only)
  packages: write     # GHCR push (main only)
  id-token: write     # cosign keyless signing via OIDC

env:
  IMAGE: images
  # Qiskit minor that the :latest-<flavor> tags and latest-<flavor> stub
  # branches alias to. Bump when a new minor ships.
  LATEST_QISKIT: '2.4'
  # Only main and manual dispatch publish to GHCR or update stub
  # branches; feature branches build for CI signal but stay sandboxed.
  PUBLISH: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

jobs:
  # Decide which versions to (re)build for this run. The full matrix is
  # ~30 builds × both arches, so blindly rebuilding everything on a
  # single-version dependabot bump is wasteful. Rules:
  #   - schedule (cron): full matrix — that's the whole point.
  #   - push/PR touching Dockerfile or this workflow: full matrix —
  #     a Dockerfile change affects every image.
  #   - push/PR touching only versions/<v>/**: just the affected <v>s.
  #   - workflow_dispatch: honor the `versions` input (default "all").
  #   - any other event (shouldn't happen): full matrix as a safe fallback.
  # Output is a JSON array consumed by build.strategy.matrix.version
  # via fromJSON. An empty array would skip the build job entirely;
  # the planner enforces a non-empty result by falling back to full.
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.plan.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history to diff against the merge-base / push base.
          # fetch-depth: 0 is heavy but cheap on this small repo.
          fetch-depth: 0

      - name: Resolve versions to build
        id: plan
        env:
          EVENT_NAME:    ${{ github.event_name }}
          DISPATCH_ARG:  ${{ inputs.versions }}
          BEFORE_SHA:    ${{ github.event.before }}
          PR_BASE_SHA:   ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:      ${{ github.sha }}
        # Canonical list of build targets. Keep this in sync with the
        # version directories under versions/ and with the README. The
        # scaffolder (.github/scripts/scaffold-new-qiskit.py) prepends
        # to this list, so newest minor stays at the top.
        run: |
          set -euo pipefail
          ALL=(
            '2.4-small' '2.4-xl' '2.4-xxl'
            '2.3-small' '2.3-xl'
            '2.2-small' '2.2-xl'
            '2.1-small' '2.1-xl'
            '2.0-small' '2.0-xl'
            '1.4-small' '1.4-xl'
          )
          to_json_array() {
            printf '%s\n' "$@" | jq -R . | jq -sc .
          }

          full() {
            # Announce on stderr so it appears in the live log but
            # doesn't get captured by `$(full ...)`. The JSON array
            # is the only thing on stdout.
            echo "Full matrix selected: ${1}" >&2
            to_json_array "${ALL[@]}"
          }

          case "${EVENT_NAME}" in
            schedule)
              versions_json=$(full "scheduled cron")
              ;;
            workflow_dispatch)
              if [ -z "${DISPATCH_ARG}" ] || [ "${DISPATCH_ARG}" = "all" ]; then
                versions_json=$(full "workflow_dispatch (default 'all')")
              else
                # Comma-separated list. Validate each entry against ALL
                # so a typo fails loudly instead of silently building
                # nothing.
                IFS=',' read -ra requested <<< "${DISPATCH_ARG}"
                selected=()
                for v in "${requested[@]}"; do
                  v="${v// /}"
                  [ -z "${v}" ] && continue
                  found=0
                  for known in "${ALL[@]}"; do
                    [ "${v}" = "${known}" ] && { found=1; break; }
                  done
                  if [ "${found}" -ne 1 ]; then
                    echo "Unknown version '${v}' in dispatch input; valid: ${ALL[*]}" >&2
                    exit 1
                  fi
                  selected+=("${v}")
                done
                if [ "${#selected[@]}" -eq 0 ]; then
                  echo "Dispatch input parsed to empty list; rebuilding nothing." >&2
                  exit 1
                fi
                echo "Dispatch matrix: ${selected[*]}"
                versions_json=$(to_json_array "${selected[@]}")
              fi
              ;;
            push|pull_request)
              # Compute the base SHA to diff against.
              if [ "${EVENT_NAME}" = "pull_request" ]; then
                base="${PR_BASE_SHA}"
              else
                base="${BEFORE_SHA}"
              fi
              # First push to a branch has BEFORE_SHA = 000...0 — there
              # is no "previous" state to diff. Build everything.
              if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ]; then
                versions_json=$(full "no base SHA available")
              else
                # Make sure we have the base locally.
                git fetch --no-tags --prune --depth=1 origin "${base}" 2>/dev/null || true
                changed=$(git diff --name-only "${base}" "${HEAD_SHA}" || git diff --name-only "${base}")
                echo "Changed files:"
                echo "${changed}" | sed 's/^/  /'
                # Universal-rebuild triggers: Dockerfile, this workflow,
                # or .trivyignore (a suppression change affects the scan
                # verdict of every image, so all must re-scan).
                if echo "${changed}" | grep -qE '^(Dockerfile|\.github/workflows/build-matrix\.yml|\.trivyignore)$'; then
                  versions_json=$(full "Dockerfile, workflow, or .trivyignore changed")
                else
                  # Requirements dependency graph (pip `-r` includes):
                  #   <minor>-xxl  -r  <minor>-xl  -r  _xl-base.txt
                  # so a change must rebuild not just the touched dir
                  # but everything that includes it transitively:
                  #   - _xl-base.txt changed -> every -xl AND -xxl
                  #   - <minor>-xl/ changed  -> that minor's -xxl too
                  xl_base_changed=0
                  if echo "${changed}" | grep -qE '^versions/_xl-base\.txt$'; then
                    xl_base_changed=1
                  fi
                  # Filter to versions/<v>/** changes and map back to
                  # canonical names; preserve ALL ordering and de-dupe.
                  selected=()
                  for v in "${ALL[@]}"; do
                    if echo "${changed}" | grep -qE "^versions/${v}/"; then
                      selected+=("${v}")
                      continue
                    fi
                    # _xl-base.txt feeds every -xl and (via -xl) every -xxl.
                    if [ "${xl_base_changed}" -eq 1 ] \
                       && { [[ "${v}" == *-xl ]] || [[ "${v}" == *-xxl ]]; }; then
                      selected+=("${v}")
                      continue
                    fi
                    # A minor's -xxl includes that same minor's -xl, so an
                    # -xl edit must also rebuild the sibling -xxl.
                    if [[ "${v}" == *-xxl ]]; then
                      sibling_xl="${v%-xxl}-xl"
                      if echo "${changed}" | grep -qE "^versions/${sibling_xl}/"; then
                        selected+=("${v}")
                        continue
                      fi
                    fi
                  done
                  if [ "${#selected[@]}" -eq 0 ]; then
                    # No version-affecting changes at all. The path
                    # filter on the trigger should have prevented this
                    # event from firing the workflow, but if we get
                    # here anyway (e.g. force-push reshapes history),
                    # build nothing rather than wasting runners.
                    echo "No version directories touched; building nothing."
                    versions_json='[]'
                  else
                    echo "Versions to rebuild: ${selected[*]}"
                    versions_json=$(to_json_array "${selected[@]}")
                  fi
                fi
              fi
              ;;
            *)
              versions_json=$(full "unrecognized event ${EVENT_NAME}")
              ;;
          esac

          echo "versions=${versions_json}" >> "$GITHUB_OUTPUT"
          echo "Final matrix JSON: ${versions_json}"

  build:
    name: build ${{ matrix.version }} (${{ matrix.platform.arch }})
    needs: plan
    if: needs.plan.outputs.versions != '[]'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.plan.outputs.versions) }}
        platform:
          - { name: linux/amd64, runner: ubuntu-latest,    arch: amd64 }
          - { name: linux/arm64, runner: ubuntu-24.04-arm, arch: arm64 }
    steps:
      - uses: actions/checkout@v6

      - name: Compute lowercase owner
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # The ubuntu-latest / ubuntu-24.04-arm runners ship with ~14 GB
      # of preinstalled toolchains (.NET, Android SDK, Haskell, Swift
      # CodeQL, Boost, etc.) we don't use. The xxl amd64 build (torch +
      # the full CUDA 13 wheelset, ~3.4 GB) bumps the disk-space ceiling
      # — "no space left on device" while extracting CUDA/Ray blobs.
      # Free up the bloat before docker buildx starts so
      # the layer cache + pulled base image + final image fit
      # comfortably. Applied to every job for symmetry; ~30s overhead.
      - name: Free up runner disk
        run: |
          set -uo pipefail
          echo "Before:"
          df -h / | tail -1
          # Suppress apt and rm errors — if a path is missing on a
          # runner variant, that's fine, we just skip it.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/share/boost \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/lib/node_modules \
            "$AGENT_TOOLSDIRECTORY/Java_Adopt_jdk" \
            "$AGENT_TOOLSDIRECTORY/Java_Temurin-Hotspot_jdk" \
            2>/dev/null || true
          sudo apt-get -y autoremove --purge >/dev/null 2>&1 || true
          sudo apt-get -y clean         >/dev/null 2>&1 || true
          docker system prune -af --volumes >/dev/null 2>&1 || true
          echo "After:"
          df -h / | tail -1

      # Pre-pull the buildkit image with retries before setup-buildx
      # runs its own (unretried) pull. Docker Hub occasionally times
      # out registry-1.docker.io — on 2026-06-02 (run 26807520486) a
      # single 15s timeout in one of 26 build jobs cascaded into the
      # entire day's manifest publish being skipped, because the
      # manifest matrix `needs: build` and one build failure flunks
      # the whole batch. Caching the image locally first makes the
      # action's pull a no-op even if Docker Hub flakes. The manifest
      # job uses setup-buildx too but only for `imagetools create`
      # against GHCR (no Docker Hub pull involved), so it doesn't
      # need the same guard.
      - name: Pre-pull buildkit image (Docker Hub flake guard)
        run: |
          set -euo pipefail
          img=moby/buildkit:buildx-stable-1
          for attempt in 1 2 3; do
            echo "::group::pull attempt ${attempt}"
            if timeout 60 docker pull "${img}"; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "pull failed; sleeping before retry ${attempt}"
            sleep $((attempt * 10))
          done
          echo "::warning::All pre-pull attempts failed; setup-buildx will try its own pull."

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (load locally so trivy can scan before publish)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: QISKIT_VERSION=${{ matrix.version }}
          platforms: ${{ matrix.platform.name }}
          tags: ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE }}:${{ matrix.version }}-${{ matrix.platform.arch }}
          push: false
          load: true
          # Force re-resolution of the base image on every build so
          # security fixes flow through; the GHA layer cache otherwise
          # pins us to whatever digest was resolved on the first build.
          pull: true
          cache-from: type=gha,scope=${{ matrix.version }}-${{ matrix.platform.arch }}
          cache-to: type=gha,scope=${{ matrix.version }}-${{ matrix.platform.arch }},mode=max

      - name: Scan local image with Trivy
        env:
          IMAGE_REF: ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE }}:${{ matrix.version }}-${{ matrix.platform.arch }}
        run: |
          set -euo pipefail
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.70.0
          # Local image is single-platform (we built one), so no
          # --platform needed; trivy will find it via docker daemon.
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "$IMAGE_REF"

      - name: Launch canary notebook inside the image
        env:
          IMAGE_REF: ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE }}:${{ matrix.version }}-${{ matrix.platform.arch }}
        # The Dockerfile already runs `import qiskit` at build time;
        # this goes one level deeper by actually executing a 2-qubit
        # Bell-pair notebook through Jupyter's nbconvert. Catches:
        #  - kernel startup failures (broken ipykernel, missing
        #    dependency at runtime that pip-resolve didn't see)
        #  - Aer simulator failures (e.g. arch-specific BLAS issues)
        #  - assertion-level result regressions
        # Runs against the just-built single-arch image still loaded
        # in the local docker daemon. Read-only bind-mount of the
        # canary directory; output notebook goes to /tmp and is
        # discarded with the container. ~10s overhead per build.
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/.github/canary:/tmp/canary:ro" \
            "$IMAGE_REF" \
            jupyter nbconvert --to notebook --execute \
              --ExecutePreprocessor.timeout=120 \
              --output /tmp/out.ipynb \
              /tmp/canary/canary.ipynb

      - name: Capture installed qiskit patch version
        id: qversion
        env:
          IMAGE_REF: ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE }}:${{ matrix.version }}-${{ matrix.platform.arch }}
        # Pull the patch version (e.g. "2.4.1") off the just-built
        # image. requirements.txt only constrains the minor; the
        # actual patch is whatever pip resolved at build time, which
        # is what we want to record on the manifest. Exposed as a
        # step output and fed into the publish step's `labels:`
        # below, where it lands in the image config and becomes
        # readable via docker buildx imagetools inspect or the
        # registry's blob API (consumed by build-pages-data.py).
        run: |
          set -euo pipefail
          patch="$(docker run --rm --entrypoint python "$IMAGE_REF" \
            -c 'import qiskit; print(qiskit.__version__)')"
          echo "patch=${patch}" >> "$GITHUB_OUTPUT"
          echo "Captured qiskit==${patch}"

      - name: Push to GHCR (with provenance attestation)
        if: env.PUBLISH == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: QISKIT_VERSION=${{ matrix.version }}
          platforms: ${{ matrix.platform.name }}
          tags: ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE }}:${{ matrix.version }}-${{ matrix.platform.arch }}
          push: true
          # OCI standard image-source / image-description labels +
          # a project-namespaced label for the qiskit patch version.
          # The base image (jupyter/base-notebook → ubuntu) ships
          # its own `org.opencontainers.image.version` value (the
          # Ubuntu release, e.g. "24.04"), so a same-name override
          # is fragile and confusing. Use a dedicated key instead.
          # build-pages-data.py reads org.qubins.qiskit.patch from
          # the image config blob and surfaces it in versions.json.
          labels: |
            org.qubins.qiskit.patch=${{ steps.qversion.outputs.patch }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=QuBins ${{ matrix.version }} — prebuilt Qiskit ${{ steps.qversion.outputs.patch }} environment
          # All layers are cache hits from the previous step, so this
          # is fast; the work it does is producing the registry push +
          # SLSA provenance attestation that load: true can't generate.
          cache-from: type=gha,scope=${{ matrix.version }}-${{ matrix.platform.arch }}

  manifest:
    name: manifest ${{ matrix.version }}
    needs: [plan, build]
    # Run per-version even when some *other* version's build failed.
    # `needs: build` is a wait, not a hard gate: GitHub's default
    # would skip every manifest entry if any build matrix entry
    # failed (the manifest matrix would inherit the aggregate `needs`
    # state). On 2026-06-02 (run 26807520486) a single Docker Hub
    # timeout in one build job skipped all 13 manifest entries that
    # day. The Combine per-arch tags step below already handles
    # partial-arch availability (it only includes arches whose tags
    # exist in GHCR), so a sibling build failure only voids that one
    # version's manifest, not the other 12.
    #
    # `always()` lets us run even when needs.build.result is failure;
    # `!cancelled()` still respects an explicit run cancellation.
    # PR runs still skip via the branch/dispatch guard. PUBLISH=true
    # check still applies at the step level inside.
    if: >-
      always() && !cancelled() &&
      needs.plan.outputs.versions != '[]' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.plan.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute lowercase owner
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - name: Combine per-arch tags into multi-arch manifest
        env:
          REPO: ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE }}
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          sources=()
          for arch in amd64 arm64; do
            tag="${REPO}:${VERSION}-${arch}"
            if docker buildx imagetools inspect "$tag" >/dev/null 2>&1; then
              echo "Found $tag"
              sources+=("$tag")
            else
              echo "Skipping $tag (not built)"
            fi
          done
          if [ ${#sources[@]} -eq 0 ]; then
            echo "No per-arch images found for $VERSION; failing." >&2
            exit 1
          fi
          # Track every tag we publish so we can sign them all below.
          tags=("${REPO}:${VERSION}")
          docker buildx imagetools create -t "${REPO}:${VERSION}" "${sources[@]}"

          # If this is the current "latest" Qiskit minor, also publish
          # an alias tag latest-<flavor>. The small flavor additionally
          # gets the bare :latest tag (the docker default).
          if [[ "${VERSION%-*}" == "${LATEST_QISKIT}" ]]; then
            flavor="${VERSION#*-}"
            docker buildx imagetools create -t "${REPO}:latest-${flavor}" "${sources[@]}"
            tags+=("${REPO}:latest-${flavor}")
            if [[ "$flavor" == "small" ]]; then
              docker buildx imagetools create -t "${REPO}:latest" "${sources[@]}"
              tags+=("${REPO}:latest")
            fi
          fi

          # Cosign keyless signing via GitHub Actions OIDC. Verifiers can
          # run: cosign verify <tag> \
          #   --certificate-identity-regexp='^https://github.com/${{ github.repository }}/' \
          #   --certificate-oidc-issuer=https://token.actions.githubusercontent.com
          for tag in "${tags[@]}"; do
            cosign sign --yes "$tag"
          done

      - name: Verify the signatures we just made
        env:
          REPO: ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE }}
          VERSION: ${{ matrix.version }}
        # Run the exact `cosign verify` invocation we document in the
        # README against every tag we just signed. Catches regressions
        # in the identity-regexp / OIDC-issuer pair: a repo rename,
        # a workflow-path change, or a sigstore policy change would
        # silently leave users unable to verify published images.
        # Failing this fails the publish job — which is the right
        # blast radius, since an unverifiable image shouldn't be
        # advertised as signed.
        run: |
          set -euo pipefail
          tags=("${REPO}:${VERSION}")
          if [[ "${VERSION%-*}" == "${LATEST_QISKIT}" ]]; then
            flavor="${VERSION#*-}"
            tags+=("${REPO}:latest-${flavor}")
            if [[ "$flavor" == "small" ]]; then
              tags+=("${REPO}:latest")
            fi
          fi
          # Rekor (the transparency log cosign verify queries) is
          # eventually-consistent: a signature pushed seconds ago may
          # return "no signatures found" until the log entry
          # propagates. Observed on 2026-05-31 (run 26706701946),
          # where 3 of 13 manifests failed verify ~1.7s after a
          # successful sign with `Error: no signatures found`. Retry
          # a few times with backoff before declaring a real
          # regression — a sustained verify failure across attempts
          # still fails the job, which is the right blast radius for
          # an unverifiable signature.
          verify_with_retry() {
            local tag="$1"
            local attempt rc
            for attempt in 1 2 3; do
              if cosign verify \
                  --certificate-identity-regexp="^https://github.com/${GITHUB_REPOSITORY}/" \
                  --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
                  "${tag}" >/dev/null 2>&1; then
                if [ "${attempt}" -gt 1 ]; then
                  echo "ok (after ${attempt} attempts)"
                else
                  echo "ok"
                fi
                return 0
              fi
              rc=$?
              if [ "${attempt}" -lt 3 ]; then
                local sleep_s=$((attempt * 5))
                echo "verify attempt ${attempt} failed (rc=${rc}); sleeping ${sleep_s}s for Rekor propagation"
                sleep "${sleep_s}"
              fi
            done
            # Final attempt with output visible so the log captures the real error.
            cosign verify \
              --certificate-identity-regexp="^https://github.com/${GITHUB_REPOSITORY}/" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
              "${tag}"
            return 1
          }
          for tag in "${tags[@]}"; do
            echo "::group::cosign verify ${tag}"
            verify_with_retry "${tag}"
            echo "::endgroup::"
          done

      - name: Sync stub branch(es) for mybinder
        env:
          OWNER_LC: ${{ steps.repo.outputs.owner_lc }}
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          sync_branch() {
            local branch="$1"
            local image="$2"
            git checkout --orphan "$branch"
            git rm -rf --cached . >/dev/null
            find . -mindepth 1 -maxdepth 1 -not -name .git -exec rm -rf {} +
            mkdir -p binder
            printf 'FROM %s\n' "$image" > binder/Dockerfile
            git add binder/Dockerfile
            git commit -m "Sync stub branch for $branch"
            git push -f origin "$branch"
          }

          REPO="ghcr.io/${OWNER_LC}/${IMAGE}"
          sync_branch "$VERSION" "${REPO}:${VERSION}"

          if [[ "${VERSION%-*}" == "${LATEST_QISKIT}" ]]; then
            flavor="${VERSION#*-}"
            sync_branch "latest-${flavor}" "${REPO}:latest-${flavor}"
          fi
