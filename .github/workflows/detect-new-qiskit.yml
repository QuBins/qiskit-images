name: Detect new Qiskit release

on:
  schedule:
    # 04:00 UTC = 05:00 CET / 06:00 CEST. Same slot as the
    # build-matrix daily cron; the two workflows are independent
    # (detector pushes a feature branch + opens a PR, build cron
    # only runs against main) so they don't need to be ordered.
    - cron: '0 4 * * *'
  workflow_dispatch:

# NOTE: the scaffold commit edits `.github/workflows/build-matrix.yml`, and the
# default GITHUB_TOKEN is forbidden from pushing changes to files under
# `.github/workflows/` (there is no grantable `workflows: write` permission key —
# GITHUB_TOKEN simply can't do it). So this job authenticates with SCAFFOLD_TOKEN,
# a PAT / fine-grained token carrying `contents: write` + `workflows: write`,
# stored as a repo secret. Using it for `gh pr create` also means the scaffold PR
# triggers CI, which a GITHUB_TOKEN-authored PR would not.
permissions:
  contents: write       # for pushing the scaffolded branch
  pull-requests: write  # for `gh pr create`

jobs:
  detect-and-scaffold:
    name: Detect and scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Persist this token as the git credential so the later `git push`
          # can update workflow files. Must have `workflows: write`.
          token: ${{ secrets.SCAFFOLD_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Look up latest qiskit on PyPI
        id: pypi
        run: |
          set -euo pipefail
          version=$(curl -sf https://pypi.org/pypi/qiskit/json | jq -r '.info.version')
          # Hard-validate the upstream string before it propagates into
          # $GITHUB_OUTPUT, branch names, git/gh commands, and (via the
          # scaffolder) filesystem paths + workflow-YAML edits. PyPI is a
          # trusted source and the resulting PR is human-reviewed, so
          # this is defense-in-depth — but it makes the trust boundary
          # explicit and fails loud if upstream ever emits something
          # unexpected (pre-release suffixes, epochs, junk).
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Refusing to proceed: unexpected qiskit version string from PyPI: '$version'" >&2
            echo "Expected a bare X.Y.Z release. Aborting scaffold." >&2
            exit 1
          fi
          minor=$(printf '%s' "$version" | cut -d. -f1-2)
          branch="bot/qiskit-${minor}"
          echo "Latest qiskit on PyPI: $version (minor $minor)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "minor=$minor"     >> "$GITHUB_OUTPUT"
          echo "branch=$branch"   >> "$GITHUB_OUTPUT"

      - name: Decide whether to scaffold
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINOR:  ${{ steps.pypi.outputs.minor }}
          BRANCH: ${{ steps.pypi.outputs.branch }}
        run: |
          set -euo pipefail
          if [ -d "versions/${MINOR}-small" ]; then
            echo "Skipping: versions/${MINOR}-small already exists."
            echo "go=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Skipping: branch $BRANCH already exists on remote."
            echo "go=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          n=$(gh pr list --head "$BRANCH" --state all --json number --jq 'length')
          if [ "$n" -gt 0 ]; then
            echo "Skipping: PR for $BRANCH already exists (any state)."
            echo "go=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "go=true" >> "$GITHUB_OUTPUT"

      - name: Scaffold
        if: steps.gate.outputs.go == 'true'
        env:
          MINOR:   ${{ steps.pypi.outputs.minor }}
          VERSION: ${{ steps.pypi.outputs.version }}
        run: python .github/scripts/scaffold-new-qiskit.py

      - name: Commit, push, open PR
        if: steps.gate.outputs.go == 'true'
        env:
          # PAT with `workflows: write` — the scaffold commit touches
          # build-matrix.yml, which GITHUB_TOKEN may not push.
          GH_TOKEN: ${{ secrets.SCAFFOLD_TOKEN }}
          MINOR:   ${{ steps.pypi.outputs.minor }}
          VERSION: ${{ steps.pypi.outputs.version }}
          BRANCH:  ${{ steps.pypi.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Scaffold Qiskit ${MINOR}

          Auto-generated by .github/workflows/detect-new-qiskit.yml after
          qiskit ${VERSION} appeared on PyPI. The xl flavor inherits the
          previous minor's addon pin set verbatim and may need pins
          relaxed for addons that don't yet support ${MINOR}."
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Add Qiskit ${MINOR}" \
            --body "Auto-scaffolded by \`.github/workflows/detect-new-qiskit.yml\` after qiskit \`${VERSION}\` appeared on PyPI.

          Generated:

          - \`versions/${MINOR}-small/requirements.txt\`
          - \`versions/${MINOR}-xl/requirements.txt\` (mirror of the previous minor's xl with the \`qiskit[all]\` pin bumped)
          - matrix entries in \`build-matrix.yml\` (build + manifest)
          - \`LATEST_QISKIT\` bump
          - \`dependabot.yml\` pip directories pointed at the new minor
          - README table rows + \"today\" line

          The xl flavor inherits the previous minor's addon pin set verbatim. CI will likely flag pins that don't yet support \`${MINOR}\` (typically \`qiskit-addon-utils\`, sometimes \`qiskit-addon-aqc-tensor\`). Investigate and relax / drop accordingly."
