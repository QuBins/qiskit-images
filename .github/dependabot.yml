version: 2
updates:
  # Base image. The Dockerfile pins to a digest, so Dependabot
  # proposes a new digest whenever quay.io/jupyter/base-notebook
  # re-publishes the python-3.X tag. Each PR runs through the full
  # Trivy + smoke gate before merging.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  # Workflow action versions. Tracks docker/build-push-action,
  # sigstore/cosign-installer, actions/checkout etc.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Qiskit-ecosystem pins in the LATEST_QISKIT minor's requirements.
  # When LATEST_QISKIT changes (a new minor ships), update the
  # directories below to point at the new minor — older minors are
  # pinned for historical reproducibility and shouldn't get bumps.
  - package-ecosystem: pip
    directories:
      - /versions/2.5-small
      - /versions/2.5-xl
      - /versions/2.5-xxl
    schedule:
      interval: weekly
    ignore:
      # qiskit itself stays pinned by minor; new minors are handled
      # by .github/workflows/detect-new-qiskit.yml which scaffolds a
      # new versions/<X.Y>-* directory rather than bumping in place.
      - dependency-name: qiskit
      # The runtime/transpiler/serverless/catalog quartet is coupled
      # and only resolves as a set. transpiler 0.18 and catalog 0.14
      # both hard-pin serverless ~=0.30, which caps runtime at <0.46.0.
      # Catalog 0.15 needs serverless ~=0.31, but no transpiler release
      # supports that yet. Bumping any one of these in isolation
      # produces an unsolvable resolve (see PRs #18, #24, #25). Lift
      # all four ignores together once a transpiler release supports
      # serverless 0.31.
      - dependency-name: qiskit-ibm-runtime
      - dependency-name: qiskit-serverless
      - dependency-name: qiskit-ibm-catalog
      - dependency-name: qiskit-ibm-transpiler
